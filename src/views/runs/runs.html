<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <style>
      /**__CODICON_CSS__**/
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--vscode-font-family);
        font-size: var(--vscode-font-size);
        color: var(--vscode-foreground);
        background: transparent;
        padding: 0 8px;
      }

      .run-card {
        background: var(--vscode-editor-background);
        border: 1px solid
          var(--vscode-widget-border, var(--vscode-editorGroup-border));
        border-radius: 6px;
        padding: 10px 12px;
        margin: 6px 0;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .run-card:hover,
      .run-card.active {
        border-color: var(--vscode-focusBorder);
      }

      .run-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .run-status {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        padding: 2px 8px;
        border-radius: 4px;
      }
      .status-passed {
        color: var(--vscode-testing-iconPassed);
        background: color-mix(
          in srgb,
          var(--vscode-testing-iconPassed) 15%,
          transparent
        );
      }
      .status-failed {
        color: var(--vscode-testing-iconFailed);
        background: color-mix(
          in srgb,
          var(--vscode-testing-iconFailed) 15%,
          transparent
        );
      }
      .status-running {
        color: var(--vscode-testing-iconQueued);
        background: color-mix(
          in srgb,
          var(--vscode-testing-iconQueued) 15%,
          transparent
        );
      }
      .status-cancelled,
      .status-timedout,
      .status-unknown {
        color: var(--vscode-disabledForeground);
        background: color-mix(
          in srgb,
          var(--vscode-disabledForeground) 15%,
          transparent
        );
      }

      .run-duration {
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
      }

      .run-title {
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 5px;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .run-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
        margin-bottom: 8px;
      }
      .run-meta span {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .run-stats {
        display: flex;
        gap: 10px;
        font-size: 11px;
        font-weight: 500;
      }
      .stat {
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .stat-passed {
        color: var(--vscode-testing-iconPassed);
      }
      .stat-failed {
        color: var(--vscode-testing-iconFailed);
      }
      .stat-skipped {
        color: var(--vscode-descriptionForeground);
      }
      .stat-flaky {
        color: #e57ab0;
      }

      .run-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid
          var(--vscode-widget-border, var(--vscode-editorGroup-border));
      }
      .action-btn {
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: none;
        cursor: pointer;
        font-size: 11px;
        font-family: var(--vscode-font-family);
        padding: 4px 10px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .action-btn:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }

      .load-more {
        display: block;
        width: 100%;
        padding: 8px;
        margin: 8px 0 12px;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-family: var(--vscode-font-family);
      }
      .load-more:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }

      .empty-state {
        text-align: center;
        padding: 24px 12px;
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
      }

      .loading {
        text-align: center;
        padding: 24px 12px;
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
      }

      .filters-bar {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding: 6px 0;
        font-size: 11px;
      }
      .filter-chip {
        background: var(--vscode-badge-background);
        color: var(--vscode-badge-foreground);
        padding: 2px 8px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .project-scope-chip {
        border: 1px solid
          var(--vscode-widget-border, var(--vscode-editorGroup-border));
        cursor: pointer;
      }
      .project-scope-chip:hover {
        opacity: 0.92;
      }

      .grouping-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 0 6px;
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
      }
      .grouping-bar label {
        white-space: nowrap;
      }
      .grouping-select {
        max-width: 200px;
        background: var(--vscode-dropdownBackground);
        color: var(--vscode-dropdownForeground);
        border: 1px solid var(--vscode-dropdown-border, var(--vscode-widget-border));
        border-radius: 4px;
        padding: 2px 6px;
        font-family: var(--vscode-font-family);
        font-size: 11px;
      }
      .run-group {
        margin: 4px 0 10px;
        border: 1px solid
          var(--vscode-widget-border, var(--vscode-editorGroup-border));
        border-radius: 6px;
        overflow: hidden;
        background: var(--vscode-sideBar-background, transparent);
      }
      .run-group-header {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        text-align: left;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: var(--vscode-editor-inactiveSelectionBackground, transparent);
        border: none;
        color: var(--vscode-foreground);
        font-family: var(--vscode-font-family);
      }
      .run-group-header:hover {
        background: var(--vscode-list-hoverBackground, transparent);
      }
      .run-group-header .group-chevron {
        font-size: 12px;
        flex-shrink: 0;
        transition: transform 0.15s;
      }
      .run-group-header.collapsed .group-chevron {
        transform: rotate(-90deg);
      }
      .run-group-title {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .run-group-count {
        color: var(--vscode-descriptionForeground);
        font-weight: 500;
        flex-shrink: 0;
      }
      .run-group-body {
        padding: 0 6px 4px;
      }
      .run-group-body.hidden {
        display: none;
      }
      .run-group-load {
        display: block;
        width: calc(100% - 8px);
        margin: 0 4px 6px;
        padding: 4px 8px;
        font-size: 11px;
        background: transparent;
        color: var(--vscode-textLink-foreground);
        border: 1px dashed var(--vscode-widget-border, var(--vscode-editorGroup-border));
        border-radius: 4px;
        cursor: pointer;
        font-family: var(--vscode-font-family);
      }
      .run-group-load:disabled,
      .run-group-load[disabled] {
        opacity: 0.65;
        cursor: default;
      }
      .run-group-load:hover:not(:disabled) {
        background: var(--vscode-list-hoverBackground);
      }

      .live-indicator {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--vscode-testing-iconQueued);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <div id="filters-bar" class="filters-bar"></div>
    <div id="grouping-bar" class="grouping-bar" hidden></div>
    <div id="runs-container"></div>
    <script>
      const vscode = acquireVsCodeApi();

      const GROUP_EXPANDED_KEY = "currents.runs.groupExpanded";
      const GROUPING_STRATEGY = "pr";
      const groupingStrategies = {
        pr: {
          keyOf: function (run) {
            return run.prGroupKey || "__no_pr__";
          },
          labelOf: function (run) {
            return run.prGroupLabel || "No PR";
          },
          perGroupButtonLabel: "Load more for this PR",
        },
      };

      let currentState = {
        runs: [],
        hasMore: false,
        loading: false,
        filters: {},
        activeRunId: null,
        projectName: null,
        groupingMode: "none",
        groupedLoadTargetKey: null,
      };

      function getGroupExpandedMap() {
        try {
          return JSON.parse(
            sessionStorage.getItem(GROUP_EXPANDED_KEY) || "{}",
          );
        } catch (e) {
          return {};
        }
      }
      function setGroupExpandedState(groupKey, expanded) {
        const m = getGroupExpandedMap();
        m[groupKey] = expanded;
        try {
          sessionStorage.setItem(
            GROUP_EXPANDED_KEY,
            JSON.stringify(m),
          );
        } catch (e) {
          console.warn(
            "setGroupExpandedState: could not persist to sessionStorage",
            GROUP_EXPANDED_KEY,
            e,
          );
        }
      }
      function isGroupExpanded(groupKey) {
        const m = getGroupExpandedMap();
        if (m[groupKey] === false) {
          return false;
        }
        if (m[groupKey] === true) {
          return true;
        }
        return true;
      }

      window.addEventListener("message", (event) => {
        const message = event.data;
        if (message.type === "state") {
          currentState = message;
          render();
        } else if (message.type === "activeRun") {
          currentState.activeRunId = message.runId || null;
          applyActiveState();
        }
      });

      function applyActiveState() {
        document.querySelectorAll(".run-card").forEach((card) => {
          card.classList.toggle(
            "active",
            card.dataset.runId === currentState.activeRunId,
          );
        });
      }

      function formatDuration(ms) {
        if (!ms) return "";
        const s = Math.floor(ms / 1000);
        if (s < 60) return s + "s";
        const m = Math.floor(s / 60);
        const rs = s % 60;
        if (m < 60) return m + "m " + rs + "s";
        const h = Math.floor(m / 60);
        const rm = m % 60;
        return h + "h " + rm + "m";
      }

      function timeAgo(dateStr) {
        const now = Date.now();
        const then = new Date(dateStr).getTime();
        const diff = now - then;
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return mins + "m ago";
        const hours = Math.floor(mins / 60);
        if (hours < 24) return hours + "h ago";
        const days = Math.floor(hours / 24);
        return days + "d ago";
      }

      function aggregateTests(run) {
        let passes = 0,
          failures = 0,
          skipped = 0,
          pending = 0,
          flaky = 0;
        const groupList = run.groups || [];
        for (const g of groupList) {
          passes += g.tests.passes;
          failures += g.tests.failures;
          skipped += g.tests.skipped;
          pending += g.tests.pending;
          flaky += g.tests.flaky;
        }
        return { passes, failures, skipped, pending, flaky };
      }

      function normalizeStatusForClass(s) {
        var t = (s == null ? "" : String(s)).toLowerCase().replace(/_/g, "");
        return t || "unknown";
      }
      function statusApiLabel(s) {
        var m = {
          PASSED: "Passed",
          FAILED: "Failed",
          RUNNING: "Running",
          FAILING: "Failing",
          TIMED_OUT: "Timed out",
          CANCELLED: "Cancelled",
        };
        if (m[s] != null) {
          return m[s];
        }
        if (!s) {
          return "";
        }
        return s
          .toLowerCase()
          .split("_")
          .filter(Boolean)
          .map(function (w) {
            return w.charAt(0).toUpperCase() + w.slice(1);
          })
          .join(" ");
      }

      function buildRunCardHtml(run) {
        const stats = aggregateTests(run);
        const runTitle = (
          run.displayTitle ||
          run.commitMessage ||
          "No title"
        ).slice(0, 70);
        const branch = run.branch || "\u2014";
        const author = run.authorName || "";
        const duration = formatDuration(run.durationMs);
        const ago = timeAgo(run.createdAt);
        const rawStatus = run.status || "";
        const statusMod = normalizeStatusForClass(rawStatus);
        const isLive = isRunInProgress(run.completionState);
        let html =
          '<div class="run-card" data-run-id="' + escAttr(run.runId) + '">';
        html += '  <div class="run-header">';
        html +=
          '    <span class="run-status status-' +
          escAttr(statusMod) +
          '">' +
          escHtml(statusApiLabel(rawStatus)) +
          "</span>";
        if (isLive) {
          html += '    <span class="live-indicator">\u25CF live</span>';
        }
        html +=
          '    <span class="run-duration">' +
          (duration ? duration + " \u00B7 " : "") +
          ago +
          "</span>";
        html += "  </div>";
        html += '  <div class="run-title">' + escHtml(runTitle) + "</div>";
        html += '  <div class="run-meta">';
        html += "    <span>\u2387 " + escHtml(branch) + "</span>";
        if (author) {
          html += "    <span>\u263A " + escHtml(author) + "</span>";
        }
        html += "  </div>";
        html += '  <div class="run-stats">';
        html +=
          '    <span class="stat stat-passed">\u2714 ' +
          stats.passes +
          "</span>";
        html +=
          '    <span class="stat stat-failed">\u2716 ' +
          stats.failures +
          "</span>";
        html +=
          '    <span class="stat stat-skipped">\u25CB ' +
          stats.skipped +
          "</span>";
        if (stats.flaky > 0) {
          html +=
            '    <span class="stat stat-flaky">\u2744 ' +
            stats.flaky +
            "</span>";
        }
        html += "  </div>";
        html += '  <div class="run-actions">';
        html +=
          '    <button class="action-btn" data-action="dashboard" data-run-id="' +
          escAttr(run.runId) +
          '"><i class="codicon codicon-forward"></i> Dashboard</button>';
        html += "  </div>";
        html += "</div>";
        return html;
      }

      function buildGroupsForStrategy(runs, strategyId) {
        const strat = groupingStrategies[strategyId];
        if (!strat) {
          return { groups: [] };
        }
        const order = [];
        const byKey = {};
        for (var i = 0; i < runs.length; i++) {
          const run = runs[i];
          const gk = strat.keyOf(run);
          if (!Object.prototype.hasOwnProperty.call(byKey, gk)) {
            byKey[gk] = {
              key: gk,
              label: strat.labelOf(run),
              runs: [],
            };
            order.push(gk);
          }
          byKey[gk].runs.push(run);
        }
        return { groups: order.map(function (k) { return byKey[k]; }) };
      }

      function render() {
        const container = document.getElementById("runs-container");
        const filtersBar = document.getElementById("filters-bar");
        const groupingBar = document.getElementById("grouping-bar");
        const { runs, hasMore, loading, filters, groupingMode } = currentState;

        if (currentState.authenticated === false) {
          filtersBar.innerHTML = "";
          groupingBar.hidden = true;
          groupingBar.innerHTML = "";
          container.innerHTML =
            '<div class="empty-state" style="padding:32px 12px">' +
            '<div style="margin-bottom:8px">Connect your Currents.dev account to see test runs.</div>' +
            '<button class="load-more" id="set-api-key-btn">Set API Key</button>' +
            "</div>";
          document
            .getElementById("set-api-key-btn")
            .addEventListener("click", function () {
              vscode.postMessage({ type: "setApiKey" });
            });
          return;
        }

        // Filters
        const chips = [];
        var svgStrokeStart =
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px">';
        var svgEnd = "</svg> ";
        var projectIcon =
          '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-1px"><path d="M2 3h4l1 1h7v9H2V3zm1 2v6h10V6H8.5L7.5 5H3z"/></svg> ';
        var branchIcon =
          svgStrokeStart +
          '<line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/>' +
          svgEnd;
        var authorIcon =
          svgStrokeStart +
          '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' +
          svgEnd;
        var tagIcon =
          svgStrokeStart +
          '<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>' +
          svgEnd;
        var statusIcon =
          svgStrokeStart + "<polygon points=\"5 3 19 12 5 21 5 3\"/>" + svgEnd;
        if (currentState.projectName) {
          chips.push(
            '<span class="filter-chip project-scope-chip" title="Open Settings to change project">' +
              projectIcon +
              "Project: " +
              escHtml(currentState.projectName) +
              "</span>",
          );
        }
        if (filters.branches && filters.branches.length) {
          chips.push(
            '<span class="filter-chip">' +
              branchIcon +
              escHtml(filters.branches[0]) +
              "</span>",
          );
        }
        if (filters.authors && filters.authors.length) {
          chips.push(
            '<span class="filter-chip">' +
              authorIcon +
              escHtml(filters.authors[0]) +
              "</span>",
          );
        }
        if (filters.tags && filters.tags.length) {
          var tagOp =
            filters.tags.length > 1
              ? " (" + (filters.tagOperator || "AND") + ") "
              : " ";
          var tagLabel =
            filters.tags.length <= 2
              ? filters.tags.map(escHtml).join(", ")
              : escHtml(filters.tags[0]) + " +" + (filters.tags.length - 1);
          chips.push(
            '<span class="filter-chip" title="Tags' +
              tagOp +
              "— use Filter button on Runs view title bar" +
              '">' +
              tagIcon +
              tagLabel +
              "</span>",
          );
        }
        if (filters.status && filters.status.length) {
          chips.push(
            '<span class="filter-chip">' +
              statusIcon +
              escHtml(
                filters.status.map(statusApiLabel).join(", "),
              ) +
              "</span>",
          );
        }
        filtersBar.innerHTML = chips.join("");
        filtersBar.onclick = currentState.projectName
          ? function (e) {
              if (e.target.closest(".project-scope-chip")) {
                vscode.postMessage({ type: "openSettings" });
              }
            }
          : null;

        groupingBar.hidden = false;
        const gm = groupingMode === "pr" ? "pr" : "none";
        groupingBar.innerHTML =
          "<label for=\"grouping-select\">Group by</label>" +
          "<select id=\"grouping-select\" class=\"grouping-select\" title=\"Group runs; more criteria can be added over time\">" +
          "<option value=\"none\">Ungrouped</option>" +
          "<option value=\"pr\">Pull request</option>" +
          "</select>" +
          "<span style=\"max-width:160px;opacity:0.85;font-size:10px\" title=\"The feed is paged globally; " +
          "per-group &quot;load more&quot; fetches the next page until it finds new runs in this group.\">" +
          "Picks up runs from the global feed" +
          "</span>";
        const groupingSelect = document.getElementById("grouping-select");
        groupingSelect.value = gm;
        groupingSelect.addEventListener("change", function () {
          const v = groupingSelect.value;
          vscode.postMessage({
            type: "setGroupingMode",
            mode: v === "pr" ? "pr" : "none",
          });
        });

        if (loading && runs.length === 0) {
          container.innerHTML = '<div class="loading">Loading runs\u2026</div>';
          return;
        }

        if (runs.length === 0) {
          const hasFilters =
            (filters.branches && filters.branches.length) ||
            (filters.authors && filters.authors.length) ||
            (filters.tags && filters.tags.length) ||
            (filters.status && filters.status.length);
          let emptyHtml = '<div class="empty-state">No runs found';
          if (hasFilters) {
            emptyHtml +=
              '<br><button class="load-more" id="clear-filters-btn" style="margin-top:12px">Clear Filters</button>';
          }
          emptyHtml += "</div>";
          container.innerHTML = emptyHtml;
          if (hasFilters) {
            document
              .getElementById("clear-filters-btn")
              .addEventListener("click", () => {
                vscode.postMessage({ type: "clearFilters" });
              });
          }
          return;
        }

        var html = "";
        var gMode = groupingMode === "pr" ? "pr" : "none";
        if (gMode === "pr") {
          var built = buildGroupsForStrategy(runs, GROUPING_STRATEGY);
          for (var gi = 0; gi < built.groups.length; gi++) {
            var g = built.groups[gi];
            var expanded = isGroupExpanded(g.key);
            var chevClass = expanded
              ? "codicon-chevron-down"
              : "codicon-chevron-right";
            var headClass =
              "run-group-header" + (expanded ? "" : " collapsed");
            var bodyClass =
              "run-group-body" + (expanded ? "" : " hidden");
            html += '<div class="run-group" data-group-key="' + escAttr(g.key) + '">';
            html +=
              '<button type="button" class="' +
              headClass +
              '" data-group-toggle="' +
              escAttr(g.key) +
              '">';
            html += '<i class="codicon ' + chevClass + ' group-chevron"></i>';
            html += '<span class="run-group-title">' + escHtml(g.label) + "</span>";
            html +=
              '<span class="run-group-count">(' + g.runs.length + ")</span>";
            html += "</button>";
            html += '<div class="' + bodyClass + '">';
            for (var rj = 0; rj < g.runs.length; rj++) {
              html += buildRunCardHtml(g.runs[rj]);
            }
            html += "</div>";
            if (hasMore) {
              var gLoad =
                currentState.groupedLoadTargetKey === g.key && loading;
              var btnLabel = gLoad
                ? "Loading\u2026"
                : groupingStrategies[GROUPING_STRATEGY].perGroupButtonLabel;
              var dAttr = loading ? " disabled" : "";
              html +=
                '<button type="button" class="run-group-load" data-group-load="' +
                escAttr(g.key) +
                '" data-group-mode="pr"' +
                dAttr +
                ">" +
                escHtml(btnLabel) +
                "</button>";
            }
            html += "</div>";
          }
        } else {
          for (var ri = 0; ri < runs.length; ri++) {
            html += buildRunCardHtml(runs[ri]);
          }
        }

        if (hasMore) {
          html +=
            '<button class="load-more" id="load-more-btn"' +
            (loading ? " disabled" : "") +
            ">" +
            (loading ? "Loading\u2026" : "Load More Runs") +
            "</button>";
        }

        container.innerHTML = html;

        // Attach click handlers
        document.querySelectorAll(".run-card").forEach((card) => {
          card.addEventListener("click", (e) => {
            if (e.target.closest(".action-btn")) return;
            vscode.postMessage({ type: "openRun", runId: card.dataset.runId });
          });
        });

        document
          .querySelectorAll('.action-btn[data-action="dashboard"]')
          .forEach((btn) => {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              vscode.postMessage({
                type: "openInDashboard",
                runId: btn.dataset.runId,
              });
            });
          });

        const loadMoreBtn = document.getElementById("load-more-btn");
        if (loadMoreBtn) {
          loadMoreBtn.addEventListener("click", () => {
            vscode.postMessage({ type: "loadMore" });
          });
        }

        document.querySelectorAll("[data-group-toggle]").forEach(function (btn) {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            const k = btn.getAttribute("data-group-toggle");
            if (k == null) {
              return;
            }
            setGroupExpandedState(k, !isGroupExpanded(k));
            render();
          });
        });
        document.querySelectorAll("[data-group-load]").forEach(function (btn) {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (btn.disabled) {
              return;
            }
            const gk = btn.getAttribute("data-group-load");
            if (gk == null) {
              return;
            }
            vscode.postMessage({
              type: "loadMoreForGroup",
              groupKey: gk,
              groupMode: "pr",
            });
          });
        });

        applyActiveState();
      }

      function isRunInProgress(completionState) {
        const v = (completionState || "").toLowerCase();
        return v === "incomplete" || v === "in_progress";
      }

      function escHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function escAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/'/g, "&#39;");
      }

      render();
      vscode.postMessage({ type: "ready" });
    </script>
  </body>
</html>

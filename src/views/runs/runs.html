<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <style>
      /**__CODICON_CSS__**/
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--vscode-font-family);
        font-size: var(--vscode-font-size);
        color: var(--vscode-foreground);
        background: transparent;
        padding: 0 8px;
      }

      .run-card {
        background: var(--vscode-editor-background);
        border: 1px solid
          var(--vscode-widget-border, var(--vscode-editorGroup-border));
        border-radius: 6px;
        padding: 10px 12px;
        margin: 6px 0;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .run-card:hover,
      .run-card.active {
        border-color: var(--vscode-focusBorder);
      }

      .run-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .run-status {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        padding: 2px 8px;
        border-radius: 4px;
      }
      .status-passed {
        color: var(--vscode-testing-iconPassed);
        background: color-mix(
          in srgb,
          var(--vscode-testing-iconPassed) 15%,
          transparent
        );
      }
      .status-failed {
        color: var(--vscode-testing-iconFailed);
        background: color-mix(
          in srgb,
          var(--vscode-testing-iconFailed) 15%,
          transparent
        );
      }
      .status-running {
        color: var(--vscode-testing-iconQueued);
        background: color-mix(
          in srgb,
          var(--vscode-testing-iconQueued) 15%,
          transparent
        );
      }
      .status-cancelled,
      .status-timedout {
        color: var(--vscode-disabledForeground);
        background: color-mix(
          in srgb,
          var(--vscode-disabledForeground) 15%,
          transparent
        );
      }

      .run-duration {
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
      }

      .run-title {
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 5px;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .run-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
        margin-bottom: 8px;
      }
      .run-meta span {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .run-stats {
        display: flex;
        gap: 10px;
        font-size: 11px;
        font-weight: 500;
      }
      .stat {
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .stat-passed {
        color: var(--vscode-testing-iconPassed);
      }
      .stat-failed {
        color: var(--vscode-testing-iconFailed);
      }
      .stat-skipped {
        color: var(--vscode-descriptionForeground);
      }
      .stat-flaky {
        color: #e57ab0;
      }

      .run-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid
          var(--vscode-widget-border, var(--vscode-editorGroup-border));
      }
      .action-btn {
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: none;
        cursor: pointer;
        font-size: 11px;
        font-family: var(--vscode-font-family);
        padding: 4px 10px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .action-btn:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }

      .load-more {
        display: block;
        width: 100%;
        padding: 8px;
        margin: 8px 0 12px;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-family: var(--vscode-font-family);
      }
      .load-more:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }

      .empty-state {
        text-align: center;
        padding: 24px 12px;
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
      }

      .loading {
        text-align: center;
        padding: 24px 12px;
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
      }

      .filters-bar {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding: 6px 0;
        font-size: 11px;
      }
      .filter-chip {
        background: var(--vscode-badge-background);
        color: var(--vscode-badge-foreground);
        padding: 2px 8px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .live-indicator {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--vscode-testing-iconQueued);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <div id="filters-bar" class="filters-bar"></div>
    <div id="runs-container"></div>
    <script>
      const vscode = acquireVsCodeApi();

      let currentState = {
        runs: [],
        hasMore: false,
        loading: false,
        filters: {},
        activeRunId: null,
      };

      window.addEventListener("message", (event) => {
        const message = event.data;
        if (message.type === "state") {
          currentState = message;
          render();
        } else if (message.type === "activeRun") {
          currentState.activeRunId = message.runId || null;
          applyActiveState();
        }
      });

      function applyActiveState() {
        document.querySelectorAll(".run-card").forEach((card) => {
          card.classList.toggle(
            "active",
            card.dataset.runId === currentState.activeRunId,
          );
        });
      }

      function formatDuration(ms) {
        if (!ms) return "";
        const s = Math.floor(ms / 1000);
        if (s < 60) return s + "s";
        const m = Math.floor(s / 60);
        const rs = s % 60;
        if (m < 60) return m + "m " + rs + "s";
        const h = Math.floor(m / 60);
        const rm = m % 60;
        return h + "h " + rm + "m";
      }

      function timeAgo(dateStr) {
        const now = Date.now();
        const then = new Date(dateStr).getTime();
        const diff = now - then;
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return mins + "m ago";
        const hours = Math.floor(mins / 60);
        if (hours < 24) return hours + "h ago";
        const days = Math.floor(hours / 24);
        return days + "d ago";
      }

      function aggregateTests(run) {
        let passes = 0,
          failures = 0,
          skipped = 0,
          pending = 0,
          flaky = 0;
        for (const g of run.groups) {
          passes += g.tests.passes;
          failures += g.tests.failures;
          skipped += g.tests.skipped;
          pending += g.tests.pending;
          flaky += g.tests.flaky;
        }
        return { passes, failures, skipped, pending, flaky };
      }

      function render() {
        const container = document.getElementById("runs-container");
        const filtersBar = document.getElementById("filters-bar");
        const { runs, hasMore, loading, filters } = currentState;

        if (currentState.authenticated === false) {
          filtersBar.innerHTML = "";
          container.innerHTML =
            '<div class="empty-state" style="padding:32px 12px">' +
            '<div style="margin-bottom:8px">Connect your Currents.dev account to see test runs.</div>' +
            '<button class="load-more" id="set-api-key-btn">Set API Key</button>' +
            "</div>";
          document
            .getElementById("set-api-key-btn")
            .addEventListener("click", function () {
              vscode.postMessage({ type: "setApiKey" });
            });
          return;
        }

        // Filters
        const chips = [];
        var filterIcon =
          '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-1px"><path d="M6 12v-1h4v1H6zM4 8v-1h8v1H4zM2 4v-1h12v1H2z"/></svg> ';
        if (filters.branches && filters.branches.length) {
          chips.push(
            '<span class="filter-chip">' +
              filterIcon +
              escHtml(filters.branches[0]) +
              "</span>",
          );
        }
        if (filters.authors && filters.authors.length) {
          chips.push(
            '<span class="filter-chip">' +
              filterIcon +
              escHtml(filters.authors[0]) +
              "</span>",
          );
        }
        filtersBar.innerHTML = chips.join("");

        if (loading && runs.length === 0) {
          container.innerHTML = '<div class="loading">Loading runs\u2026</div>';
          return;
        }

        if (runs.length === 0) {
          const hasFilters =
            (filters.branches && filters.branches.length) ||
            (filters.authors && filters.authors.length);
          let emptyHtml = '<div class="empty-state">No runs found';
          if (hasFilters) {
            emptyHtml +=
              '<br><button class="load-more" id="clear-filters-btn" style="margin-top:12px">Clear Filters</button>';
          }
          emptyHtml += "</div>";
          container.innerHTML = emptyHtml;
          if (hasFilters) {
            document
              .getElementById("clear-filters-btn")
              .addEventListener("click", () => {
                vscode.postMessage({ type: "clearFilters" });
              });
          }
          return;
        }

        let html = "";
        for (const run of runs) {
          const stats = aggregateTests(run);
          const commitMsg = (run.commitMessage || "No title").slice(0, 70);
          const branch = run.branch || "\u2014";
          const author = run.authorName || "";
          const duration = formatDuration(run.durationMs);
          const ago = timeAgo(run.createdAt);

          const statusLower = (run.status || "").toLowerCase();
          const isLive = isRunInProgress(run.completionState);
          html += '<div class="run-card" data-run-id="' + run.runId + '">';
          html += '  <div class="run-header">';
          html +=
            '    <span class="run-status status-' +
            escHtml(statusLower) +
            '">' +
            escHtml(statusLower) +
            "</span>";
          if (isLive) {
            html += '    <span class="live-indicator">\u25CF live</span>';
          }
          html +=
            '    <span class="run-duration">' +
            (duration ? duration + " \u00B7 " : "") +
            ago +
            "</span>";
          html += "  </div>";
          html += '  <div class="run-title">' + escHtml(commitMsg) + "</div>";
          html += '  <div class="run-meta">';
          html += "    <span>\u2387 " + escHtml(branch) + "</span>";
          if (author) {
            html += "    <span>\u263A " + escHtml(author) + "</span>";
          }
          html += "  </div>";
          html += '  <div class="run-stats">';
          html +=
            '    <span class="stat stat-passed">\u2714 ' +
            stats.passes +
            "</span>";
          html +=
            '    <span class="stat stat-failed">\u2716 ' +
            stats.failures +
            "</span>";
          html +=
            '    <span class="stat stat-skipped">\u25CB ' +
            stats.skipped +
            "</span>";
          if (stats.flaky > 0) {
            html +=
              '    <span class="stat stat-flaky">\u2744 ' +
              stats.flaky +
              "</span>";
          }
          html += "  </div>";
          html += '  <div class="run-actions">';
          html +=
            '    <button class="action-btn" data-action="dashboard" data-run-id="' +
            run.runId +
            '"><i class="codicon codicon-forward"></i> Dashboard</button>';
          html += "  </div>";
          html += "</div>";
        }

        if (hasMore) {
          html +=
            '<button class="load-more" id="load-more-btn">' +
            (loading ? "Loading\u2026" : "Load More Runs") +
            "</button>";
        }

        container.innerHTML = html;

        // Attach click handlers
        document.querySelectorAll(".run-card").forEach((card) => {
          card.addEventListener("click", (e) => {
            if (e.target.closest(".action-btn")) return;
            vscode.postMessage({ type: "openRun", runId: card.dataset.runId });
          });
        });

        document
          .querySelectorAll('.action-btn[data-action="dashboard"]')
          .forEach((btn) => {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              vscode.postMessage({
                type: "openInDashboard",
                runId: btn.dataset.runId,
              });
            });
          });

        const loadMoreBtn = document.getElementById("load-more-btn");
        if (loadMoreBtn) {
          loadMoreBtn.addEventListener("click", () => {
            vscode.postMessage({ type: "loadMore" });
          });
        }

        applyActiveState();
      }

      function isRunInProgress(completionState) {
        const v = (completionState || "").toLowerCase();
        return v === "incomplete" || v === "in_progress";
      }

      function escHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      render();
      vscode.postMessage({ type: "ready" });
    </script>
  </body>
</html>

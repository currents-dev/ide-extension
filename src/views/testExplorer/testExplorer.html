<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <style>
      /**__CODICON_CSS__**/
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--vscode-font-family);
        font-size: var(--vscode-font-size);
        color: var(--vscode-foreground);
        background: transparent;
        padding: 0 8px;
      }

      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px 0;
        position: sticky;
        top: 0;
        background: var(
          --vscode-sideBar-background,
          var(--vscode-editor-background)
        );
        z-index: 10;
      }

      .tab-bar {
        display: flex;
        gap: 4px;
      }
      .tab-btn {
        flex: 1;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        font-family: var(--vscode-font-family);
        border: 1px solid
          var(--vscode-widget-border, var(--vscode-editorGroup-border));
        border-radius: 4px;
        cursor: pointer;
        background: transparent;
        color: var(--vscode-descriptionForeground);
        transition: all 0.15s;
      }
      .tab-btn:hover {
        background: var(--vscode-toolbar-hoverBackground);
      }
      .tab-btn.active {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border-color: var(--vscode-button-background);
      }

      .summary {
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
        padding: 2px 0 4px;
      }

      .test-card {
        background: var(--vscode-editor-background);
        border: 1px solid
          var(--vscode-widget-border, var(--vscode-editorGroup-border));
        border-radius: 6px;
        padding: 10px 12px;
        margin: 4px 0;
      }

      .test-spec {
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-bottom: 3px;
      }

      .test-title {
        font-weight: 600;
        font-size: 13px;
        line-height: 1.3;
        margin-bottom: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .test-metrics {
        display: flex;
        gap: 12px;
        font-size: 11px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .metric {
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .metric-label {
        color: var(--vscode-descriptionForeground);
      }
      .metric-value {
        font-weight: 600;
      }
      .m-flaky {
        color: #e57ab0;
      }
      .m-duration {
        color: var(--vscode-testing-iconQueued);
      }
      .m-executions {
        color: var(--vscode-descriptionForeground);
      }

      .flaky-bar-track {
        height: 3px;
        background: color-mix(
          in srgb,
          var(--vscode-foreground) 10%,
          transparent
        );
        border-radius: 2px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .flaky-bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s;
      }
      .fill-flaky {
        background: #e57ab0;
      }
      .fill-duration {
        background: var(--vscode-testing-iconQueued);
      }

      .test-actions {
        display: flex;
        gap: 6px;
      }
      .btn {
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: none;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        font-family: var(--vscode-font-family);
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .btn:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }
      .btn-primary {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
      }
      .btn-primary:hover {
        background: var(--vscode-button-hoverBackground);
      }

      .load-more {
        display: block;
        width: 100%;
        padding: 8px;
        margin: 8px 0 12px;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-family: var(--vscode-font-family);
      }
      .load-more:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }

      .empty-state {
        text-align: center;
        padding: 24px 12px;
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
      }

      .loading {
        text-align: center;
        padding: 24px 12px;
        color: var(--vscode-descriptionForeground);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="tab-bar">
        <button class="tab-btn active" data-mode="flakiest">
          &#x2744; Flakiest
        </button>
        <button class="tab-btn" data-mode="slowest">&#x23F1; Slowest</button>
      </div>
    </div>
    <div class="summary" id="summary"></div>
    <div id="tests-container"></div>
    <script>
      const vscode = acquireVsCodeApi();

      let currentState = {
        tests: [],
        loading: false,
        dateRange: "14d",
        sortMode: "flakiest",
        total: 0,
        hasMore: false,
      };

      window.addEventListener("message", function (event) {
        var msg = event.data;
        if (msg.type === "state") {
          currentState = msg;
          render();
        }
      });

      document.querySelectorAll(".tab-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          vscode.postMessage({
            type: "changeSortMode",
            mode: btn.dataset.mode,
          });
        });
      });

      function formatDuration(ms) {
        if (!ms) return "0ms";
        if (ms < 1000) return Math.round(ms) + "ms";
        var s = ms / 1000;
        if (s < 60) return s.toFixed(1) + "s";
        var m = Math.floor(s / 60);
        var rs = Math.round(s % 60);
        return m + "m " + rs + "s";
      }

      function render() {
        var container = document.getElementById("tests-container");
        var summary = document.getElementById("summary");
        var toolbar = document.querySelector(".toolbar");
        var tests = currentState.tests;
        var sortMode = currentState.sortMode;
        var dateRange = currentState.dateRange;

        if (currentState.authenticated === false) {
          toolbar.style.display = "none";
          summary.textContent = "";
          container.innerHTML =
            '<div style="text-align:center;padding:32px 12px;color:var(--vscode-descriptionForeground);font-size:12px">' +
            '<div style="margin-bottom:8px">Connect your Currents.dev account to explore tests.</div>' +
            '<button class="load-more" id="set-api-key-btn">Set API Key</button>' +
            "</div>";
          document
            .getElementById("set-api-key-btn")
            .addEventListener("click", function () {
              vscode.postMessage({ type: "setApiKey" });
            });
          return;
        }
        toolbar.style.display = "";

        document.querySelectorAll(".tab-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.mode === sortMode);
        });
        if (currentState.loading && tests.length === 0) {
          summary.textContent = "";
          container.innerHTML =
            '<div class="loading">Loading tests\u2026</div>';
          return;
        }

        if (tests.length === 0) {
          summary.textContent = "";
          container.innerHTML =
            '<div class="empty-state">No tests found for this period.</div>';
          return;
        }

        var rangeLabels = {
          "14d": "14 days",
          "30d": "30 days",
          "60d": "60 days",
          "90d": "90 days",
        };
        summary.textContent =
          "Showing " +
          tests.length +
          " of " +
          currentState.total +
          " tests \u00B7 Last " +
          rangeLabels[dateRange];

        var html = "";
        for (var i = 0; i < tests.length; i++) {
          var t = tests[i];
          var flakyPct = (t.flakinessRate * 100).toFixed(1);
          var barWidth =
            sortMode === "flakiest"
              ? Math.min(t.flakinessRate * 100, 100)
              : Math.min((t.avgDurationMs / getMaxDuration(tests)) * 100, 100);
          var barClass =
            sortMode === "flakiest" ? "fill-flaky" : "fill-duration";

          html += '<div class="test-card">';
          html += '  <div class="test-spec">' + escHtml(t.spec) + "</div>";
          html += '  <div class="test-title">' + escHtml(t.title) + "</div>";
          html += '  <div class="test-metrics">';
          html +=
            '    <span class="metric"><span class="metric-label">Flaky:</span> <span class="metric-value m-flaky">' +
            flakyPct +
            "%</span></span>";
          html +=
            '    <span class="metric"><span class="metric-label">Avg:</span> <span class="metric-value m-duration">' +
            formatDuration(t.avgDurationMs) +
            "</span></span>";
          html +=
            '    <span class="metric"><span class="metric-label">Runs:</span> <span class="metric-value m-executions">' +
            t.executions +
            "</span></span>";
          html += "  </div>";
          html +=
            '  <div class="flaky-bar-track"><div class="flaky-bar-fill ' +
            barClass +
            '" style="width:' +
            barWidth.toFixed(1) +
            '%"></div></div>';
          html += '  <div class="test-actions">';
          html +=
            '    <button class="btn" data-action="fixWithAI" data-spec="' +
            escAttr(t.spec) +
            '" data-title="' +
            escAttr(t.title) +
            '" data-signature="' +
            escAttr(t.signature) +
            '" data-flakiness="' +
            t.flakinessRate +
            '" data-duration="' +
            t.avgDurationMs +
            '"><i class="codicon codicon-chat-sparkle"></i> Fix with agent</button>';
          html +=
            '    <button class="btn" data-action="goToFile" data-spec="' +
            escAttr(t.spec) +
            '" data-title="' +
            escAttr(t.lastTitle) +
            '"><i class="codicon codicon-go-to-file"></i> Go to file</button>';
          html += "  </div>";
          html += "</div>";
        }

        if (currentState.hasMore) {
          html +=
            '<button class="load-more" id="load-more-btn">' +
            (currentState.loading ? "Loading\u2026" : "Load More Tests") +
            "</button>";
        }

        container.innerHTML = html;

        document
          .querySelectorAll('[data-action="goToFile"]')
          .forEach(function (btn) {
            btn.addEventListener("click", function (e) {
              e.stopPropagation();
              vscode.postMessage({
                type: "goToFile",
                spec: btn.dataset.spec,
                testTitle: btn.dataset.title,
              });
            });
          });

        document
          .querySelectorAll('[data-action="fixWithAI"]')
          .forEach(function (btn) {
            btn.addEventListener("click", function (e) {
              e.stopPropagation();
              vscode.postMessage({
                type: "fixWithAI",
                spec: btn.dataset.spec,
                testTitle: btn.dataset.title,
                signature: btn.dataset.signature,
                flakinessRate: parseFloat(btn.dataset.flakiness),
                avgDuration: parseFloat(btn.dataset.duration),
                sortMode: currentState.sortMode,
              });
            });
          });

        var loadMoreBtn = document.getElementById("load-more-btn");
        if (loadMoreBtn) {
          loadMoreBtn.addEventListener("click", function () {
            vscode.postMessage({ type: "loadMore" });
          });
        }
      }

      function getMaxDuration(tests) {
        var max = 0;
        for (var i = 0; i < tests.length; i++) {
          if (tests[i].avgDurationMs > max) max = tests[i].avgDurationMs;
        }
        return max || 1;
      }

      function escHtml(s) {
        var d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }

      function escAttr(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      render();
      vscode.postMessage({ type: "ready" });
    </script>
  </body>
</html>
